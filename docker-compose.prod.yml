# docker-compose.prod.yml — Production / staging stack for StoreVille
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file OVERRIDES the base docker-compose.yml for production:
#  - Backend uses Gunicorn instead of Django's dev server
#  - Django uses production settings (DEBUG=False, proper ALLOWED_HOSTS)
#  - No volume bind-mounts (static build image, not live code reload)
#  - Health checks on all services
#  - Nginx reverse proxy (handles SSL termination, static/media files)

version: '3.8'

services:

  postgres:
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    restart: always
    # Override the CMD to use Gunicorn instead of Django's dev server
    command: gunicorn --config gunicorn.conf.py config.wsgi:application
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    # Remove the volume bind-mount so we run from the built image, not live code
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    restart: always
    # Remove bind-mounts — run from the built image
    volumes: []
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      backend:
        condition: service_healthy

  # ── Nginx — reverse proxy, SSL termination, static/media serving ──────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - media_files:/app/media:ro
      - static_files:/app/staticfiles:ro
      # Mount SSL certificates (Let's Encrypt or your own)
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  media_files:
  static_files:
