services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ✅ SECURITY FIX: No external port binding. Postgres is only reachable
    # by other Docker services (backend, frontend) via internal Docker networking.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # ✅ SECURITY FIX: Password-protected and not publicly exposed.
    command: redis-server --requirepass ${REDIS_PASSWORD}
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  backend:
    build:
      context: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    # ✅ DEVOPS FIX: Build happens inside Dockerfile, not on every container start.
    # This prevents the 2-minute downtime on every `docker compose restart`.
    command: npm start
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    env_file:
      - .env
    # ✅ FIX: Alpine Linux (used by node:22-alpine) drops external DNS packets
    # locally. Explicitly set Google DNS so it can resolve oauth2.googleapis.com
    # without EAI_AGAIN timeouts.
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - backend

  # ── ngrok tunnel (DEV ONLY — not present in docker-compose.prod.yml) ────────
  # Provides a stable public HTTPS domain so Google OAuth redirect URIs work
  # from both the browser and the mobile app. Uses a free static domain so the
  # URL never changes between restarts.
  # Dashboard: http://localhost:4040
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: http --url=willette-conclusive-robby.ngrok-free.dev frontend:3000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"    # ngrok web UI — visit to inspect tunneled requests
    depends_on:
      - frontend

volumes:
  postgres_data: