# nginx/conf.d/storeville.conf — Virtual host config for StoreVille
# Handles:
#   - storeville.app       → Next.js frontend (port 3000)
#   - storeville.app/api/  → Django backend via Gunicorn (port 8000)
#   - /media/ and /static/ → Served directly by Nginx (no Django overhead)

# ── Upstream services ─────────────────────────────────────────────────────────
upstream django_backend {
    server backend:8000;
    keepalive 32;
}

upstream nextjs_frontend {
    server frontend:3000;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name storeville.app www.storeville.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — Main site ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name storeville.app www.storeville.app;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20M;  # Allow file uploads up to 20MB

    # ── Django API routes ──────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://django_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Keep-alive to Gunicorn
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # ── Django Admin ───────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://django_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Django Static Files (collected by collectstatic) ──────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── User-uploaded Media Files ─────────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Health check (non-rate-limited) ───────────────────────────────────────
    location /health/ {
        proxy_pass http://django_backend;
        access_log  off;
    }

    # ── Everything else → Next.js frontend ───────────────────────────────────
    location / {
        proxy_pass         http://nextjs_frontend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";  # WebSocket support for Next.js HMR
        proxy_read_timeout 60s;
    }
}
